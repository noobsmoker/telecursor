# Cursor Dynamics Foundation Model - Stage 1 Configuration
# Updated with RoPE, SwiGLU, and physics constraints

model:
  name: "CursorDynamics-Base-v2"
  architecture:
    # Tokenization - separate embeddings to avoid vocab explosion
    d_model: 768
    embed_dim: 96  # d_model / 8 per dimension
    
    # Transformer core
    n_layers: 12
    n_heads: 12
    d_ff: 3072
    dropout: 0.1
    attention_dropout: 0.1
    
    # Activation: SwiGLU for efficiency
    activation: "swiGLU"
    
    # Positional encoding: RoPE for better length extrapolation
    pos_encoding: "rotary"
    max_seq_len: 4096
    
    # Physics constraints (human limits)
    physics_constraints:
      enabled: true
      max_velocity: 5000      # px/s (human limit)
      max_acceleration: 50000 # px/s²
      jerk_penalty_weight: 0.1

training:
  # Optimization
  optimizer: "AdamW"
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

  # Learning rate schedule: warmup + stable + decay
  lr_schedule: "warmup_stable_decay"
  warmup_steps: 2000
  stable_steps: 480000
  decay_steps: 20000
  min_lr_ratio: 0.1

  # Regularization
  gradient_clipping: 1.0
  dropout_schedule: "linear_increase"

  # Memory optimization
  gradient_checkpointing: true
  mixed_precision: "bf16"

  # Batch configuration
  batch_size: 512
  micro_batch: 32
  sequence_length: 2048

  # Data augmentation
  augmentation:
    temporal_jitter: 0.1
    spatial_noise: 2.0
    occlusion_masking: 0.15
    viewport_resizing: [0.5, 2.0]
    left_handed_flip: 0.5

  # Loss composition
  loss_weights:
    next_position: 1.0
    velocity_consistency: 0.5
    acceleration_jerk: 0.3

  # Evaluation
  eval_every: 5000
  save_every: 10000
  keep_last_n: 5

hardware:
  precision: "bf16-mixed"
  distributed: "FSDP"
  compile: true

data:
  sources:
    - "cursor-telemetry/trajectories-v1"
    - "cursor-telemetry/synthetic-human-baseline"

  preprocessing:
    bot_detection: true
    min_session_duration: 5000
    max_session_duration: 600000
    deduplication: "perceptual_hash"

privacy:
  enable_dp: true
  epsilon: 3.0
  delta: 1e-5
  max_grad_norm: 1.0
  noise_multiplier: 1.1

logging:
  backend: "wandb"
  project: "telecursor"
  entity: "cursor-telemetry"
  log_every: 100
