# Stage 3: Task Reasoning Model Configuration
# Session-level intent and task completion prediction

# Model dimensions (from SPEC.md)
d_model: 1024
n_layers: 24

# State Space Model parameters
ssm_d_state: 16
ssm_d_conv: 4
ssmexpand: 2

# Output heads
num_intents: 10  # browse, search, form_fill, click, scroll, etc.
num_tasks: 20    # Task completion categories
frustration_levels: 3  # low, medium, high

# Training hyperparameters
learning_rate: 3.0e-5  # Lower LR for fine-tuning
weight_decay: 0.01
dropout: 0.1

# Optimizer
optimizer: adamw
beta1: 0.9
beta2: 0.95

# Learning rate schedule
warmup_steps: 500
total_steps: 250000
scheduler: cosine

# Gradient
grad_clip: 1.0

# Batch size (smaller due to long sequences)
batch_size: 4
gradient_accumulation: 16  # Effective batch = 64

# Data
max_seq_len: 5000  # Full session length
min_seq_len: 100

# Loss weights
loss_weights:
  intent: 1.0
  task: 1.5
  frustration: 1.0

# PPO fine-tuning (optional)
ppo:
  enabled: false
  clip_ratio: 0.2
  epochs: 4
  gamma: 0.99
  lam: 0.95

# Evaluation
eval_every: 2500
save_checkpoint_every: 5000
num_checkpoints_to_keep: 3

# Mixed precision
use_amp: true
amp_dtype: bfloat16

# Logging
log_every: 50
project: telecursor
run_name: stage3-reasoning